<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Coding — Marketing UI Kit</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Maven Pro', sans-serif; background: #F5FAFF; color: #545454; -webkit-font-smoothing: antialiased; }
</style>
<style>
@font-face {
  font-family: 'Maven Pro';
  src: url('../../fonts/MavenPro-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
</style></head>
<body>
<div id="root"></div>

<script type="text/babel">
/* ── Tokens ─────────────────────────────────────────────────── */
const T = {
  baltic:   '#01638E', ocean:    '#0091CE', bluebell: '#1F96DB',
  sapphire: '#3771D6', lavender: '#D7E4F9', prussian: '#101C32',
  alice:    '#F5FAFF', charcoal: '#545454', white: '#FFFFFF',
  grad: 'linear-gradient(135deg,#1F96DB 0%,#3771D6 100%)',
  fontD: "'Poppins', sans-serif", fontB: "'Maven Pro', sans-serif",
};

/* ── Helpers ─────────────────────────────────────────────────── */
const Accent = ({ children }) => (
  <span style={{ background: T.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
    {children}
  </span>
);

const Divider = ({ width = 64 }) => (
  <div style={{ display: 'flex', height: 4, width, borderRadius: 2, overflow: 'hidden', margin: '12px 0 20px' }}>
    <div style={{ flex: 1, background: T.baltic }} />
    <div style={{ flex: 1, background: T.ocean }} />
  </div>
);

/* ── Inline SVG helpers ─────────────────────────────────────── */
function applyDuotoneColors(svg, fill = '#01638E', stroke = '#1F96DB') {
  svg.querySelectorAll('[opacity="0.2"]').forEach(el => el.setAttribute('fill', fill));
  svg.querySelectorAll('[stroke="currentColor"]').forEach(el => el.setAttribute('stroke', stroke));
  svg.querySelectorAll('[fill="currentColor"]').forEach(el => el.setAttribute('fill', stroke));
}

function applyLogoColors(svg, st0 = '#01638E', st1 = '#0091CE') {
  svg.querySelectorAll('.st0').forEach(el => { el.setAttribute('fill', st0); el.removeAttribute('class'); });
  svg.querySelectorAll('.st1').forEach(el => { el.setAttribute('fill', st1); el.removeAttribute('class'); });
}

const BrandLogo = ({ height = 32, dark = false }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const src = dark ? '../../assets/logos/Logo-White.svg' : '../../assets/logos/Logo-Colour.svg';
    const st0 = dark ? '#FFFFFF' : T.baltic;
    const st1 = dark ? '#FFFFFF' : T.ocean;
    fetch(src)
      .then(r => r.text()).then(text => {
        const tmp = document.createElement('div');
        tmp.innerHTML = text.replace(/style="enable-background:[^"]*"/g, '');
        const svg = tmp.querySelector('svg');
        applyLogoColors(svg, st0, st1);
        svg.setAttribute('height', height);
        svg.removeAttribute('width');
        svg.style.cssText = `height:${height}px;width:auto;display:block;`;
        if (ref.current) { ref.current.innerHTML = ''; ref.current.appendChild(svg); }
      });
  }, []);
  return <div ref={ref} style={{ height, display: 'flex', alignItems: 'center' }} />;
};

const InlineIcon = ({ src, size = 22 }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    fetch(src).then(r => r.text()).then(text => {
      const tmp = document.createElement('div');
      tmp.innerHTML = text;
      const svg = tmp.querySelector('svg');
      applyDuotoneColors(svg);
      svg.setAttribute('width', size); svg.setAttribute('height', size);
      if (ref.current) { ref.current.innerHTML = ''; ref.current.appendChild(svg); }
    });
  }, [src]);
  return <div ref={ref} style={{ width: size, height: size, flexShrink: 0 }} />;
};

/* ── NavBar ─────────────────────────────────────────────────── */
const NavBar = ({ activePage, setPage }) => {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const el = document.getElementById('root');
    const onScroll = () => setScrolled(el.scrollTop > 20);
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  const links = ['Services', 'How it works', 'Case studies', 'About'];
  return (
    <nav style={{
      position: 'sticky', top: 0, zIndex: 100,
      background: scrolled ? 'rgba(255,255,255,.96)' : T.white,
      borderBottom: `1px solid ${T.lavender}`,
      backdropFilter: 'blur(12px)',
      padding: '0 80px', height: 72,
      display: 'flex', alignItems: 'center', gap: 48,
      transition: 'box-shadow .2s',
      boxShadow: scrolled ? '0 4px 20px rgba(16,28,50,.06)' : 'none',
    }}>
      <BrandLogo height={32} />
      <div style={{ display: 'flex', gap: 32, marginLeft: 16 }}>
        {links.map(l => (
          <button key={l} onClick={() => setPage && setPage(l)}
            style={{
              background: 'none', border: 'none', cursor: 'pointer',
              fontFamily: T.fontB, fontSize: 15, fontWeight: 500,
              color: activePage === l ? T.ocean : T.prussian,
              borderBottom: activePage === l ? `2px solid ${T.ocean}` : '2px solid transparent',
              paddingBottom: 2, transition: 'color .15s',
            }}>
            {l}
          </button>
        ))}
      </div>
      <button style={{
        marginLeft: 'auto', background: T.ocean, color: '#fff',
        fontFamily: T.fontB, fontSize: 14, fontWeight: 600,
        padding: '10px 28px', borderRadius: 9999, border: 'none', cursor: 'pointer',
        transition: 'background .15s, transform .15s',
      }}
        onMouseEnter={e => { e.target.style.background = T.baltic; e.target.style.transform = 'translateY(-1px)'; }}
        onMouseLeave={e => { e.target.style.background = T.ocean; e.target.style.transform = 'none'; }}
      >
        Get started
      </button>
    </nav>
  );
};

/* ── HeroSection ─────────────────────────────────────────────── */
const HeroSection = () => (
  <section style={{
    background: T.white, padding: '96px 80px',
    display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80,
    alignItems: 'center', position: 'relative', overflow: 'hidden',
  }}>
    {/* Pattern overlay */}
    <div style={{
      position: 'absolute', inset: 0, pointerEvents: 'none',
      backgroundImage: `url('../../assets/patterns/Pattern_HORIZONTAL.svg')`,
      backgroundSize: 'auto 100%', backgroundPosition: 'right center', backgroundRepeat: 'no-repeat',
      opacity: .05,
    }} />
    <div style={{ position: 'relative', zIndex: 1 }}>
      <div style={{ fontFamily: T.fontB, fontSize: 13, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase', color: T.ocean, marginBottom: 24 }}>
        Nearshore Engineering · Since 2014
      </div>
      <h1 style={{ fontFamily: T.fontD, fontSize: 64, fontWeight: 700, lineHeight: 1.08, color: T.prussian }}>
        Build engineering teams with <Accent>confidence</Accent>
      </h1>
      <Divider width={80} />
      <p style={{ fontSize: 20, color: T.charcoal, lineHeight: 1.65, maxWidth: 520, marginBottom: 40 }}>
        We connect <strong style={{ color: T.prussian, fontWeight: 600 }}>Latin American engineering talent</strong> with global organizations. Pre-vetted, time-zone aligned, ready to ship.
      </p>
      <div style={{ display: 'flex', gap: 16 }}>
        <button style={{
          background: T.ocean, color: '#fff', fontFamily: T.fontB,
          fontSize: 16, fontWeight: 600, padding: '14px 36px',
          borderRadius: 9999, border: 'none', cursor: 'pointer',
          transition: 'all .2s',
        }}
          onMouseEnter={e => { e.target.style.background = T.baltic; e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 8px 24px rgba(0,145,206,.3)'; }}
          onMouseLeave={e => { e.target.style.background = T.ocean; e.target.style.transform = 'none'; e.target.style.boxShadow = 'none'; }}
        >
          Schedule a call
        </button>
        <button style={{
          background: 'transparent', color: T.prussian, fontFamily: T.fontB,
          fontSize: 16, fontWeight: 600, padding: '14px 36px',
          borderRadius: 9999, border: `1.5px solid ${T.lavender}`, cursor: 'pointer',
          transition: 'all .2s',
        }}
          onMouseEnter={e => { e.target.style.borderColor = T.ocean; e.target.style.color = T.ocean; }}
          onMouseLeave={e => { e.target.style.borderColor = T.lavender; e.target.style.color = T.prussian; }}
        >
          View case studies
        </button>
      </div>
    </div>
    <div style={{ borderRadius: 20, overflow: 'hidden', boxShadow: '0 16px 64px rgba(16,28,50,.14)', position: 'relative', zIndex: 1, aspectRatio: '4/3' }}>
      <img src="../../assets/imagery/BC_Image_Team_02_3x2.png" alt="Blue Coding team" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
    </div>
  </section>
);

/* ── StatsBar ─────────────────────────────────────────────────── */
const StatsBar = () => {
  const stats = [
    { num: '10+', label: 'Years in business' },
    { num: '500+', label: 'Engineers placed' },
    { num: '98%', label: 'Client retention' },
    { num: '72h', label: 'Time to first candidate' },
  ];
  return (
    <section style={{
      background: T.prussian, padding: '60px 80px',
      display: 'grid', gridTemplateColumns: `repeat(${stats.length}, 1fr)`,
      gap: 1, position: 'relative', overflow: 'hidden',
    }}>
      <div style={{ position: 'absolute', inset: 0, backgroundImage: `url('../../assets/patterns/Pattern_HORIZONTAL.svg')`, backgroundSize: 'auto 100%', backgroundPosition: 'right center', backgroundRepeat: 'no-repeat', opacity: .06 }} />
      {stats.map((s, i) => (
        <div key={i} style={{
          textAlign: 'center', padding: '0 32px',
          borderRight: i < stats.length - 1 ? '1px solid rgba(255,255,255,.1)' : 'none',
          position: 'relative', zIndex: 1,
        }}>
          <div style={{ fontFamily: T.fontD, fontSize: 56, fontWeight: 700, background: T.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text', lineHeight: 1 }}>
            {s.num}
          </div>
          <div style={{ fontSize: 15, color: 'rgba(255,255,255,.55)', marginTop: 10, fontWeight: 500 }}>{s.label}</div>
        </div>
      ))}
    </section>
  );
};

/* ── ServicesSection ─────────────────────────────────────────── */
const ServicesSection = () => {
  const services = [
    {
      icon: '../../assets/icons/People/users-three-duotone.svg',
      title: 'Staff Augmentation',
      desc: 'Embed pre-vetted LATAM engineers directly into your team. Time-zone aligned, ready to contribute from day one.',
      tag: 'Most popular',
    },
    {
      icon: '../../assets/icons/Business/lightning-duotone.svg',
      title: 'Dedicated AI Pods',
      desc: 'Purpose-built AI teams to accelerate your ML roadmap. Data engineers, MLEs, and AI architects in one pod.',
      tag: 'New in 2026',
    },
    {
      icon: '../../assets/icons/Business/rocket-launch-duotone.svg',
      title: 'Forward Deployed',
      desc: 'Senior engineers embedded at your site, acting as extensions of your internal team for critical initiatives.',
      tag: 'Enterprise',
    },
  ];
  const [hover, setHover] = React.useState(null);
  return (
    <section style={{ background: T.alice, padding: '96px 80px' }}>
      <div style={{ textAlign: 'center', marginBottom: 64 }}>
        <div style={{ fontFamily: T.fontB, fontSize: 13, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase', color: T.ocean, marginBottom: 16 }}>
          Engagement models
        </div>
        <h2 style={{ fontFamily: T.fontD, fontSize: 48, fontWeight: 700, color: T.prussian, lineHeight: 1.15 }}>
          Three ways to <Accent>engage</Accent>
        </h2>
        <div style={{ display: 'flex', justifyContent: 'center' }}><Divider width={80} /></div>
        <p style={{ fontSize: 18, color: T.charcoal, maxWidth: 560, margin: '0 auto', lineHeight: 1.65 }}>
          Choose the model that fits your velocity and budget.
        </p>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 28 }}>
        {services.map((s, i) => (
          <div key={i}
            onMouseEnter={() => setHover(i)}
            onMouseLeave={() => setHover(null)}
            style={{
              background: T.white, borderRadius: 20,
              padding: 40, boxShadow: hover === i ? '0 16px 48px rgba(16,28,50,.12)' : '0 4px 16px rgba(16,28,50,.07)',
              transform: hover === i ? 'translateY(-4px)' : 'none',
              transition: 'all .25s ease-out',
              display: 'flex', flexDirection: 'column', gap: 16,
              position: 'relative', overflow: 'hidden',
              border: hover === i ? `1px solid ${T.lavender}` : '1px solid transparent',
            }}>
            {/* Tag */}
            <div style={{ position: 'absolute', top: 24, right: 24, background: T.lavender, color: T.prussian, fontSize: 11, fontWeight: 600, padding: '4px 12px', borderRadius: 9999, letterSpacing: '.04em' }}>
              {s.tag}
            </div>
            <div style={{ width: 56, height: 56, background: T.lavender, borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <InlineIcon src={s.icon} size={34} />
            </div>
            <h3 style={{ fontFamily: T.fontD, fontSize: 22, fontWeight: 600, color: T.prussian }}>{s.title}</h3>
            <p style={{ fontSize: 16, color: T.charcoal, lineHeight: 1.65, margin: 0 }}>{s.desc}</p>
            <button style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: 0,
              fontFamily: T.fontB, fontSize: 14, fontWeight: 600, color: T.ocean,
              display: 'flex', alignItems: 'center', gap: 6, marginTop: 'auto',
              transition: 'gap .15s',
            }}>
              Learn more →
            </button>
          </div>
        ))}
      </div>
    </section>
  );
};

/* ── TeamCard ─────────────────────────────────────────────────── */
const TeamCard = ({ img, name, role, skills }) => (
  <div style={{
    background: T.white, borderRadius: 16, overflow: 'hidden',
    boxShadow: '0 4px 16px rgba(16,28,50,.08)',
    transition: 'box-shadow .2s, transform .2s',
  }}
    onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 12px 40px rgba(16,28,50,.12)'; e.currentTarget.style.transform = 'translateY(-3px)'; }}
    onMouseLeave={e => { e.currentTarget.style.boxShadow = '0 4px 16px rgba(16,28,50,.08)'; e.currentTarget.style.transform = 'none'; }}
  >
    <div style={{ height: 200, overflow: 'hidden' }}>
      <img src={img} alt={name} style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'top' }} />
    </div>
    <div style={{ padding: '20px 24px 24px' }}>
      <div style={{ fontFamily: T.fontD, fontSize: 17, fontWeight: 600, color: T.prussian }}>{name}</div>
      <div style={{ fontSize: 13, color: T.ocean, fontWeight: 500, marginTop: 3 }}>{role}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 14 }}>
        {skills.map(s => (
          <span key={s} style={{ background: T.lavender, color: T.prussian, fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 9999 }}>{s}</span>
        ))}
      </div>
    </div>
  </div>
);

const TeamSection = () => (
  <section style={{ background: T.white, padding: '96px 80px' }}>
    <div style={{ marginBottom: 56 }}>
      <div style={{ fontFamily: T.fontB, fontSize: 13, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase', color: T.ocean, marginBottom: 16 }}>Our talent network</div>
      <h2 style={{ fontFamily: T.fontD, fontSize: 48, fontWeight: 700, color: T.prussian }}>Engineers ready to <Accent>ship</Accent></h2>
      <Divider width={80} />
      <p style={{ fontSize: 18, color: T.charcoal, maxWidth: 520, lineHeight: 1.65 }}>Every candidate is pre-vetted through technical assessments and live code review before they reach you.</p>
    </div>
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 24 }}>
      <TeamCard img="../../assets/imagery/BC_Image_Individual_01_3x2.png" name="Carlos M." role="Senior Full-Stack Engineer" skills={['React', 'Node.js', 'AWS']} />
      <TeamCard img="../../assets/imagery/BC_Image_Individual_03_4x5.png" name="Valentina R." role="ML Engineer" skills={['Python', 'PyTorch', 'MLOps']} />
      <TeamCard img="../../assets/imagery/BC_Image_Team_03_4x5.png" name="Diego A." role="DevOps Engineer" skills={['Kubernetes', 'Terraform', 'GCP']} />
      <TeamCard img="../../assets/imagery/BC_Image_Individual_04_1x1.png" name="Sofía L." role="Product Engineer" skills={['TypeScript', 'GraphQL', 'Next.js']} />
    </div>
  </section>
);

/* ── TestimonialSection ───────────────────────────────────────── */

  const testimonials = [
    { quote: "Blue Coding delivered a senior team in under a week. The engineers feel like part of our company — not contractors.", name: "CTO, Series B startup", logo: null },
    { quote: "We scaled our AI pod from 2 to 12 engineers in 3 months. The quality bar they hold is exceptional.", name: "VP Engineering, Enterprise SaaS", logo: null },
  ];
  return (
    <section style={{ background: T.alice, padding: '80px 80px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
        {testimonials.map((t, i) => (
          <div key={i} style={{ background: T.white, borderRadius: 20, padding: 40, boxShadow: '0 4px 16px rgba(16,28,50,.07)', display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ width: 32, height: 32, fontFamily: T.fontD, fontSize: 64, fontWeight: 700, color: T.ocean, opacity: .3, lineHeight: .5 }}>"</div>
            <p style={{ fontFamily: T.fontD, fontSize: 20, fontWeight: 600, color: T.prussian, lineHeight: 1.45, margin: 0 }}>{t.quote}</p>
            <div style={{ fontSize: 13, color: T.charcoal, fontWeight: 500, marginTop: 'auto' }}>— {t.name}</div>
          </div>
        ))}
      </div>
    </section>
  );
};

/* ── CTASection ───────────────────────────────────────────────── */
const CTASection = () => (
  <section style={{
    background: T.prussian, padding: '96px 80px',
    display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center',
    position: 'relative', overflow: 'hidden',
  }}>
    <div style={{ position: 'absolute', inset: 0, backgroundImage: `url('../../assets/patterns/Pattern_HORIZONTAL.svg')`, backgroundSize: 'auto 100%', backgroundPosition: 'right center', backgroundRepeat: 'no-repeat', opacity: .06 }} />
    <div style={{ position: 'relative', zIndex: 1 }}>
      <div style={{ fontFamily: T.fontB, fontSize: 13, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase', color: T.ocean, marginBottom: 24 }}>Ready to move fast?</div>
      <h2 style={{ fontFamily: T.fontD, fontSize: 56, fontWeight: 700, color: '#fff', lineHeight: 1.1, maxWidth: 800 }}>
        Hire smarter. Scale with <Accent>confidence</Accent>.
      </h2>
      <p style={{ fontSize: 18, color: 'rgba(255,255,255,.55)', maxWidth: 540, margin: '24px auto 48px', lineHeight: 1.65 }}>
        Join 200+ companies that trust Blue Coding to build their engineering teams.
      </p>
      <div style={{ display: 'flex', gap: 16, justifyContent: 'center' }}>
        <button style={{ background: T.ocean, color: '#fff', fontFamily: T.fontB, fontSize: 16, fontWeight: 600, padding: '16px 44px', borderRadius: 9999, border: 'none', cursor: 'pointer' }}
          onMouseEnter={e => { e.target.style.background = T.baltic; }}
          onMouseLeave={e => { e.target.style.background = T.ocean; }}
        >Schedule a call</button>
        <button style={{ background: 'transparent', color: '#fff', fontFamily: T.fontB, fontSize: 16, fontWeight: 600, padding: '16px 44px', borderRadius: 9999, border: '2px solid rgba(255,255,255,.25)', cursor: 'pointer' }}
          onMouseEnter={e => { e.target.style.borderColor = 'rgba(255,255,255,.5)'; }}
          onMouseLeave={e => { e.target.style.borderColor = 'rgba(255,255,255,.25)'; }}
        >View case studies</button>
      </div>
    </div>
  </section>
);

/* ── Footer ───────────────────────────────────────────────────── */
const Footer = () => (
  <footer style={{ background: T.prussian, borderTop: '1px solid rgba(255,255,255,.08)', padding: '48px 80px 32px' }}>
    <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 48, marginBottom: 48 }}>
      <div>
        <BrandLogo height={28} dark={true} />
        <div style={{ marginBottom: 16 }} />
        <p style={{ fontSize: 14, color: 'rgba(255,255,255,.45)', lineHeight: 1.65, maxWidth: 280 }}>
          Nearshore software development connecting LATAM engineering talent with global teams since 2014.
        </p>
      </div>
      {[['Services', ['Staff Augmentation','AI Pods','Forward Deployed']], ['Company', ['About','Blog','Careers']], ['Contact', ['hello@bluecoding.com','Schedule a call','LinkedIn']]].map(([title, items]) => (
        <div key={title}>
          <div style={{ fontFamily: T.fontB, fontSize: 12, fontWeight: 600, letterSpacing: '.08em', textTransform: 'uppercase', color: T.ocean, marginBottom: 16 }}>{title}</div>
          {items.map(item => <div key={item} style={{ fontSize: 14, color: 'rgba(255,255,255,.45)', marginBottom: 10, cursor: 'pointer' }}>{item}</div>)}
        </div>
      ))}
    </div>
    <div style={{ borderTop: '1px solid rgba(255,255,255,.08)', paddingTop: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
      <div style={{ fontSize: 13, color: 'rgba(255,255,255,.3)' }}>© 2026 Blue Coding. All rights reserved.</div>
      <div style={{ display: 'flex', gap: 24 }}>
        <div style={{ opacity: .5 }}><InlineIcon src="../../assets/icons/Communication/linkedin-logo-duotone.svg" size={20} /></div>
        <div style={{ opacity: .5 }}><InlineIcon src="../../assets/icons/Communication/envelope-duotone.svg" size={20} /></div>
      </div>
    </div>
  </footer>
);

/* ── App ─────────────────────────────────────────────────────── */
const App = () => {
  const [page, setPage] = React.useState('Home');
  return (
    <div id="root-scroll" style={{ height: '100vh', overflowY: 'auto' }}>
      <NavBar activePage={page} setPage={setPage} />
      <HeroSection />
      <StatsBar />
      <ServicesSection />
      <TeamSection />
      <TestimonialSection />
      <CTASection />
      <Footer />
    </div>
  );
};

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
</html>
