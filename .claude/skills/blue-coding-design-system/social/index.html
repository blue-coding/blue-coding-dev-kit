/* ── Logo injection (properly sizes SVG) ───────────────────── */
const mkLogo=(src,st0,st1,height)=>{
  const ref=React.useRef(null);
  React.useEffect(()=>{
    fetch(src).then(r=>r.text()).then(text=>{
      const tmp=document.createElement('div');
      tmp.innerHTML=text.replace(/style="enable-background:[^"]*"/g,'');
      const svg=tmp.querySelector('svg');
      if(!svg) return;
      svg.querySelectorAll('.st0').forEach(el=>{el.setAttribute('fill',st0);el.removeAttribute('class');});
      svg.querySelectorAll('.st1').forEach(el=>{el.setAttribute('fill',st1);el.removeAttribute('class');});
      svg.removeAttribute('style');svg.removeAttribute('width');svg.removeAttribute('height');
      svg.style.cssText=`height:${height}px;width:auto;display:block;`;
      if(ref.current){ref.current.innerHTML='';ref.current.appendChild(svg);}
    });
  },[]);
  return ref;
};
const Sym=({dark=false,h=40,top=52,left=52})=>{
  const ref=mkLogo(dark?'../assets/logos/Symbol-White.svg':'../assets/logos/Symbol-Colour.svg',dark?'#fff':T.baltic,dark?'#fff':T.ocean,h);
  return <div ref={ref} style={{position:'absolute',top,left,zIndex:10,height:h}}/>;
};
const Logo=({dark=false,h=36,top=52,left=52})=>{

};

/* ── Inline SVG icon ───────────────────────────────────────── */
const Icon=({src,size=48,fill=T.baltic,stroke=T.bluebell,fillOpacity=0.2,style={}})=>{
  const ref=React.useRef(null);
  React.useEffect(()=>{
    fetch(src).then(r=>r.text()).then(text=>{
      const tmp=document.createElement('div');tmp.innerHTML=text;
      const svg=tmp.querySelector('svg');
      if(!svg) return;
      svg.querySelectorAll('[opacity="0.2"]').forEach(el=>{
        el.setAttribute('fill',fill);
        el.setAttribute('fill-opacity', String(fillOpacity));
        el.removeAttribute('opacity');
      });
      svg.querySelectorAll('[stroke="currentColor"]').forEach(el=>el.setAttribute('stroke',stroke));
      svg.querySelectorAll('[fill="currentColor"]').forEach(el=>el.setAttribute('fill',stroke));
      svg.querySelectorAll('rect[fill="none"]').forEach(el=>el.remove());
      svg.removeAttribute('width');svg.removeAttribute('height');
      svg.style.cssText=`width:${size}px;height:${size}px;display:block;`;
      if(ref.current){ref.current.innerHTML='';ref.current.appendChild(svg);}
    });
  },[src,size]);
  return <div ref={ref} style={{width:size,height:size,flexShrink:0,...style}}/>;
};
