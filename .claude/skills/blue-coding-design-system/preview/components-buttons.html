<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--font-body); padding: 24px; }
.wrap { background: #fff; border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 16px; }
.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.label-row { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--color-charcoal); width: 100%; margin-top: 4px; }
/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-body); font-weight: 600; border-radius: var(--radius-pill); border: none; cursor: pointer; transition: all .2s ease-out; text-decoration: none; }
.btn-lg { font-size: 15px; padding: 12px 28px; }
.btn-md { font-size: 14px; padding: 10px 22px; }
.btn-sm { font-size: 12px; padding: 7px 16px; }

.btn-primary   { background: var(--color-ocean-blue); color: #fff; }
.btn-primary:hover { background: var(--color-baltic-blue); transform: translateY(-1px); box-shadow: var(--shadow-md); }

.btn-secondary { background: transparent; color: var(--color-ocean-blue); border: 1.5px solid var(--color-ocean-blue); }
.btn-secondary:hover { background: var(--color-lavender); }

.btn-dark { background: var(--color-prussian-blue); color: #fff; }
.btn-dark:hover { background: #1a2d4a; transform: translateY(-1px); box-shadow: var(--shadow-md); }

.btn-ghost { background: transparent; color: var(--color-prussian-blue); border: 1.5px solid var(--color-lavender); }
.btn-ghost:hover { border-color: var(--color-ocean-blue); color: var(--color-ocean-blue); }

.btn-gradient { background: linear-gradient(135deg, #1F96DB, #3771D6); color: #fff; border: none; }
.btn-gradient:hover { opacity: .9; transform: translateY(-1px); box-shadow: var(--shadow-md); }

.btn-icon { width: 20px; height: 20px; display: inline-block; }
.btn-icon img { width: 100%; height: 100%; }
</style></head><body>
<div class="wrap">
  <div class="label-row">Variants</div>
  <div class="row">
    <button class="btn btn-primary btn-md">Get started</button>
    <button class="btn btn-secondary btn-md">Learn more</button>
    <button class="btn btn-dark btn-md">Schedule a call</button>
    <button class="btn btn-ghost btn-md">View case study</button>
    <button class="btn btn-gradient btn-md">Hire engineers</button>
  </div>
  <div class="label-row">Sizes</div>
  <div class="row">
    <button class="btn btn-primary btn-lg">Large</button>
    <button class="btn btn-primary btn-md">Medium</button>
    <button class="btn btn-primary btn-sm">Small</button>
  </div>
  <div class="label-row">With icon</div>
  <div class="row">
    <button class="btn btn-primary btn-md">
      <span class="btn-icon" style="color:#fff;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="20" height="20"><circle cx="100" cy="96" r="60" opacity=".2" fill="currentColor"/><circle cx="100" cy="96" r="60" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><path d="M12.99,224a88,88,0,0,1,174.02,0" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><circle cx="204" cy="176" r="28" opacity=".2" fill="currentColor"/><circle cx="204" cy="176" r="28" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><line x1="204" y1="148" x2="204" y2="204" stroke="currentColor" stroke-width="16" stroke-linecap="round"/><line x1="176" y1="176" x2="232" y2="176" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg></span>
      Build your team
    </button>
    <button class="btn btn-secondary btn-md">
      <span class="btn-icon" style="color:var(--color-ocean-blue);"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="20" height="20"><path d="M105.48,187.93A96.1,96.1,0,0,1,48,96a80,80,0,0,1,160,0c0,43.52-26.34,72.73-54,91.83" opacity=".2" fill="currentColor"/><path d="M105.48,187.93A96.1,96.1,0,0,1,48,96a80,80,0,0,1,160,0c0,43.52-26.34,72.73-54,91.83" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="128" y1="96" x2="128" y2="48" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><polyline points="96 208 128 224 160 208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg></span>
      Get started
    </button>
  </div>
</div>
</body></html>
