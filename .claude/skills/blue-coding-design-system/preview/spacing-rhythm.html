<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--font-body); padding: 24px; }
.wrap { display: flex; gap: 16px; }
.panel { background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); flex: 1; }
.section-title { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--color-charcoal); margin-bottom: 12px; }
.rhythm-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.gap-block { background: var(--color-ocean-blue); opacity: .25; border-radius: 2px; height: 100%; }
.label-text { font-size: 11px; color: var(--color-prussian-blue); font-family: monospace; }
.label-px { font-size: 10px; color: var(--color-charcoal); }
.radii-row { display: flex; gap: 10px; align-items: flex-end; }
.radius-box { background: var(--color-lavender); border: 2px solid var(--color-ocean-blue); width: 48px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; }
.radius-label { font-size: 9px; font-weight: 600; color: var(--color-prussian-blue); text-align: center; font-family: monospace; }
.shadow-row { display: flex; gap: 10px; }
.shadow-box { width: 60px; height: 44px; border-radius: var(--radius-md); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: var(--color-charcoal); font-family: monospace; }
</style></head><body>
<div class="wrap">
  <div class="panel">
    <div class="section-title">Layout rhythm</div>
    <div class="rhythm-row"><div style="width:4px;height:20px;background:var(--color-ocean-blue);opacity:.3;border-radius:2px;"></div><span class="label-text">title→subtitle</span><span class="label-px">8px</span></div>
    <div class="rhythm-row"><div style="width:12px;height:20px;background:var(--color-ocean-blue);opacity:.3;border-radius:2px;"></div><span class="label-text">heading→body</span><span class="label-px">24px</span></div>
    <div class="rhythm-row"><div style="width:8px;height:20px;background:var(--color-ocean-blue);opacity:.3;border-radius:2px;"></div><span class="label-text">paragraph</span><span class="label-px">16px</span></div>
    <div class="rhythm-row"><div style="width:24px;height:20px;background:var(--color-ocean-blue);opacity:.3;border-radius:2px;"></div><span class="label-text">section</span><span class="label-px">48px</span></div>
    <div class="rhythm-row"><div style="width:32px;height:20px;background:var(--color-ocean-blue);opacity:.3;border-radius:2px;"></div><span class="label-text">page margin</span><span class="label-px">64px</span></div>
  </div>
  <div class="panel">
    <div class="section-title">Corner radius</div>
    <div class="radii-row">
      <div><div class="radius-box" style="border-radius:4px;"></div><div class="radius-label">4px<br>sm</div></div>
      <div><div class="radius-box" style="border-radius:8px;"></div><div class="radius-label">8px<br>md</div></div>
      <div><div class="radius-box" style="border-radius:12px;"></div><div class="radius-label">12px<br>lg</div></div>
      <div><div class="radius-box" style="border-radius:16px;"></div><div class="radius-label">16px<br>xl</div></div>
      <div><div class="radius-box" style="border-radius:9999px;"></div><div class="radius-label">pill</div></div>
    </div>
    <div class="section-title" style="margin-top:16px;">Shadows</div>
    <div class="shadow-row">
      <div class="shadow-box" style="box-shadow:0 1px 3px rgba(16,28,50,.08);">sm</div>
      <div class="shadow-box" style="box-shadow:0 4px 12px rgba(16,28,50,.10);">md</div>
      <div class="shadow-box" style="box-shadow:0 8px 24px rgba(16,28,50,.12);">lg</div>
      <div class="shadow-box" style="box-shadow:0 16px 48px rgba(16,28,50,.14);">xl</div>
    </div>
  </div>
</div>
</body></html>
