<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--font-body); padding: 24px; }
.grid { display: flex; flex-wrap: wrap; gap: 8px; }
.token { background: #fff; border-radius: var(--radius-md); padding: 10px 12px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 10px; min-width: 120px; }
.bar-wrap { width: 48px; display: flex; align-items: center; justify-content: flex-end; }
.bar { background: var(--color-ocean-blue); border-radius: 2px; height: 8px; }
.token-info { }
.token-name { font-size: 11px; font-weight: 600; color: var(--color-prussian-blue); font-family: monospace; }
.token-val  { font-size: 10px; color: var(--color-charcoal); margin-top: 2px; }
</style></head><body>
<div class="grid">
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:2px;"></div></div><div class="token-info"><div class="token-name">--space-1</div><div class="token-val">4px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:4px;"></div></div><div class="token-info"><div class="token-name">--space-2</div><div class="token-val">8px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:6px;"></div></div><div class="token-info"><div class="token-name">--space-3</div><div class="token-val">12px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:8px;"></div></div><div class="token-info"><div class="token-name">--space-4</div><div class="token-val">16px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:10px;"></div></div><div class="token-info"><div class="token-name">--space-5</div><div class="token-val">20px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:12px;"></div></div><div class="token-info"><div class="token-name">--space-6</div><div class="token-val">24px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:16px;"></div></div><div class="token-info"><div class="token-name">--space-8</div><div class="token-val">32px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:20px;"></div></div><div class="token-info"><div class="token-name">--space-10</div><div class="token-val">40px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:24px;"></div></div><div class="token-info"><div class="token-name">--space-12</div><div class="token-val">48px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:32px;"></div></div><div class="token-info"><div class="token-name">--space-16</div><div class="token-val">64px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:40px;"></div></div><div class="token-info"><div class="token-name">--space-20</div><div class="token-val">80px</div></div></div>
  <div class="token"><div class="bar-wrap"><div class="bar" style="width:48px;"></div></div><div class="token-info"><div class="token-name">--space-24</div><div class="token-val">96px</div></div></div>
</div>
</body></html>
