<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--font-body); padding: 20px; }
.grid { display: flex; flex-wrap: wrap; gap: 10px; }
.icon-card {
  background: #fff; border-radius: var(--radius-md); padding: 12px 8px 8px;
  box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
  align-items: center; gap: 6px; width: 76px;
}
.icon-card svg { width: 32px; height: 32px; }
.icon-label { font-size: 9px; color: var(--color-charcoal); text-align: center; line-height: 1.3; }
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; color: var(--color-ocean-blue);
  width: 100%; margin-top: 8px;
}
</style>
</head><body>
<div class="grid" id="grid"></div>
<script>
const icons = [
  { label: 'Actions (10)', items: [
    'Actions/check-circle-duotone.svg',
    'Actions/check-square-duotone.svg',
    'Actions/copy-duotone.svg',
    'Actions/download-duotone.svg',
    'Actions/link-duotone.svg',
    'Actions/magnifying-glass-duotone.svg',
    'Actions/pencil-simple-duotone.svg',
    'Actions/seal-check-duotone.svg',
    'Actions/trash-duotone.svg',
    'Actions/upload-duotone.svg',
  ]},
  { label: 'Business & Strategy (8)', items: [
    'Business/chart-bar-duotone.svg',
    'Business/lightbulb-duotone.svg',
    'Business/lightning-duotone.svg',
    'Business/medal-duotone.svg',
    'Business/rocket-launch-duotone.svg',
    'Business/target-duotone.svg',
    'Business/trend-up-duotone.svg',
    'Business/trophy-duotone.svg',
  ]},
  { label: 'Communication (6)', items: [
    'Communication/calendar-check-duotone.svg',
    'Communication/chat-text-duotone.svg',
    'Communication/envelope-duotone.svg',
    'Communication/linkedin-logo-duotone.svg',
    'Communication/phone-call-duotone.svg',
    'Communication/video-camera-duotone.svg',
  ]},
  { label: 'Documents & Content (4)', items: [
    'Documents/book-open-text-duotone.svg',
    'Documents/clipboard-text-duotone.svg',
    'Documents/files-duotone.svg',
    'Documents/presentation-chart-duotone.svg',
  ]},
  { label: 'Finance & Contracts (2)', items: [
    'Finance/currency-dollar-duotone.svg',
    'Finance/signature-duotone.svg',
  ]},
  { label: 'Interface & Navigation (3)', items: [
    'Interface/list-duotone.svg',
    'Interface/plus-circle-duotone.svg',
    'Interface/stack-duotone.svg',
  ]},
  { label: 'Location & Global (2)', items: [
    'Location/globe-duotone.svg',
    'Location/map-pin-area-duotone.svg',
  ]},
  { label: 'Misc Utility (2)', items: [
    'Misc/clock-duotone.svg',
    'Misc/gear-six-duotone.svg',
  ]},
  { label: 'People & Team (4)', items: [
    'People/briefcase-duotone.svg',
    'People/handshake-duotone.svg',
    'People/user-circle-check-duotone.svg',
    'People/users-three-duotone.svg',
  ]},
  { label: 'Security & Trust (2)', items: [
    'Security/lock-key-duotone.svg',
    'Security/shield-checkered-duotone.svg',
  ]},
  { label: 'Software & Development (4)', items: [
    'Software/code-duotone.svg',
    'Software/database-duotone.svg',
    'Software/git-branch-duotone.svg',
    'Software/terminal-window-duotone.svg',
  ]},
  { label: 'Status & Feedback (3)', items: [
    'Status/info-duotone.svg',
    'Status/warning-circle-duotone.svg',
    'Status/warning-duotone.svg',
  ]},
  { label: 'Values (4)', items: [
    'Values/brain-duotone.svg',
    'Values/diamond-duotone.svg',
    'Values/hexagon-duotone.svg',
    'Values/scales-duotone.svg',
  ]},
];

function getName(path) {
  return path.split('/').pop().replace('-duotone.svg','').replace(/-/g,' ');
}

async function loadSVG(src) {
  const res = await fetch('../assets/icons/' + src);
  const text = await res.text();
  const tmp = document.createElement('div');
  tmp.innerHTML = text;
  const svg = tmp.querySelector('svg');
  svg.removeAttribute('width');
  svg.removeAttribute('height');
  svg.removeAttribute('style');
  // Apply duotone colors
  svg.querySelectorAll('[opacity="0.2"]').forEach(el => { el.setAttribute('fill','#01638E'); el.setAttribute('fill-opacity','0.2'); el.removeAttribute('opacity'); });
  svg.querySelectorAll('[stroke="currentColor"]').forEach(el => el.setAttribute('stroke','#1F96DB'));
  svg.querySelectorAll('[fill="currentColor"]').forEach(el => el.setAttribute('fill','#1F96DB'));
  svg.querySelectorAll('rect[fill="none"]').forEach(el => el.remove());
  return svg.outerHTML;
}

async function render() {
  const grid = document.getElementById('grid');
  for (const group of icons) {
    const label = document.createElement('span');
    label.className = 'section-label';
    label.textContent = group.label;
    grid.appendChild(label);
    for (const src of group.items) {
      const svg = await loadSVG(src);
      const card = document.createElement('div');
      card.className = 'icon-card';
      card.innerHTML = svg + `<div class="icon-label">${getName(src)}</div>`;
      grid.appendChild(card);
    }
  }
}
render();
</script>
</body></html>
