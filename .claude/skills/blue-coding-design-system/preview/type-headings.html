<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-page); font-family: var(--font-body); padding: 24px; }
.specimen { background: #fff; border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 14px; }
.row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--color-lavender); padding-bottom: 12px; }
.row:last-child { border-bottom: none; padding-bottom: 0; }
.meta { min-width: 90px; flex-shrink: 0; }
.meta-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--color-charcoal); }
.meta-spec  { font-size: 10px; color: var(--color-charcoal); margin-top: 3px; font-family: monospace; opacity: .7; }
</style></head><body>
<div class="specimen">
  <div class="row">
    <div class="meta"><div class="meta-label">H1</div><div class="meta-spec">32px / 700</div></div>
    <h1>Nearshore engineering teams</h1>
  </div>
  <div class="row">
    <div class="meta"><div class="meta-label">H2</div><div class="meta-spec">26px / 600</div></div>
    <h2>Staff augmentation at scale</h2>
  </div>
  <div class="row">
    <div class="meta"><div class="meta-label">H3</div><div class="meta-spec">22px / 600</div></div>
    <h3>Dedicated AI pods for your stack</h3>
  </div>
  <div class="row">
    <div class="meta"><div class="meta-label">H4</div><div class="meta-spec">18px / 600</div></div>
    <h4>Forward-deployed engineers</h4>
  </div>
  <div class="row">
    <div class="meta"><div class="meta-label">Subtitle</div><div class="meta-spec">20px / 500</div></div>
    <div class="subtitle">Connecting LATAM talent with global orgs since 2014.</div>
  </div>
</div>
</body></html>
